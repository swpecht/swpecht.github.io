[package]
name = "card_platypus"
version = "0.1.0"
edition = "2021"


# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
games =  { path = "../games" }

rand = "0.10"
log = "0.4"
clap = { version = "4.5", features = ["derive"] }
itertools = "0.14"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rmp-serde = "1.3" # can be set to human readable for debugging
tempfile = "3.24"
rustc-hash = "2.1.1"
approx = "0.5"
rayon = "1.11"
dashmap = {version = "6.1.0", features = ["serde"]}
indicatif = "0.18.3"
features = {version ="0.10", git = "https://github.com/swpecht/features-rs.git"}
simplelog = "0.12"
anyhow = "1.0"
dyn-clone = "1.0"
toml = "0.9"
bitflags = "^2.10"
memmap2 = "0.9.9"
boomphf = {version = "0.6", git = "https://github.com/10XGenomics/rust-boomphf.git", features = ["serde"]}
bytemuck = "1.25"
half = "2.7"
tinyvec = {version="1.10", features =["serde"]}

[dev-dependencies]
criterion = "0.8"

[package.metadata.cargo-machete]
ignored = ["bitflags"]

[[bench]]
name = "game_benchmarks"
harness = false

[[bench]]
name = "agent_benchmarks"
harness = false

[[bench]]
name = "pimcts_optimizations"
harness = false

[[bench]]
name = "node_storage_benchmark"
harness = false
